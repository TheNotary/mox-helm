{{- if include "mox.anyDomainNeedsDkimGeneration" . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mox.fullname" . }}-dkim-keygen
  labels:
    {{- include "mox.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "mox.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dkim-keygen
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "mox.fullname" . }}-dkim-keygen
      containers:
        - name: dkim-keygen
          {{- $dkimProvider := include "mox.dkimProviderName" . -}}
          {{- $dkimCfg := include "mox.providerConfig" (dict "name" $dkimProvider "providers" .Values.providers) | fromYaml }}
          image: {{ $dkimCfg.image | default "alpine:3.20" }}
          command: ["sh", "-c", "apk add --no-cache openssl curl > /dev/null 2>&1 && sh /scripts/generate-dkim.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: {{ include "mox.fullname" . }}-dkim-keygen
{{- end }}
