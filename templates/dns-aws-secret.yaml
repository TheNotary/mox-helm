{{- if include "mox.anyNeedsDnsHook" . }}
{{- if include "mox.anyDomainHasDns" . }}
{{- include "mox.validateSameDnsProvider" . }}
{{- end }}
{{- include "mox.validateTlsrptProviders" . }}
{{- $dnsProviderName := include "mox.dnsHookProvider" . }}
{{- include "mox.requireProvider" (dict "feature" "dns" "name" $dnsProviderName "expectedPlatform" "aws" "providers" .Values.providers) }}
{{- $cfg := include "mox.providerConfig" (dict "name" $dnsProviderName "providers" .Values.providers) | fromYaml }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mox.fullname" . }}-dns-aws-credentials
  labels:
    {{- include "mox.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade,pre-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  aws-access-key-id: {{ required "dns provider config.accessKeyId is required" $cfg.accessKeyId | quote }}
  aws-secret-access-key: {{ required "dns provider config.secretAccessKey is required" $cfg.secretAccessKey | quote }}
  aws-region: {{ $cfg.region | default "us-east-1" | quote }}
{{- end }}
