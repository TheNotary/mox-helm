{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mox.secretName" . }}
  labels:
    {{- include "mox.labels" . | nindent 4 }}
type: Opaque
stringData:
  domains.conf: |
    Domains:
    {{- if .Values.domains }}
    {{- range $cfg := .Values.domains }}
    	{{ $cfg.name }}:
    {{- if $cfg.description }}
    		Description: {{ $cfg.description }}
    {{- end }}
    {{- $needsGeneration := include "mox.domainNeedsDkimGeneration" (dict "domain" $cfg "global" $) -}}
    {{- $effectiveSelectors := include "mox.dkimSelectorsForDomain" (dict "domain" $cfg "global" $) | fromYaml -}}
    {{- if $effectiveSelectors }}
    		DKIM:
    			Selectors:
    {{- range $sel, $selCfg := $effectiveSelectors }}
    				{{ $sel }}:
    					PrivateKeyFile: /mox/config/dkim/{{ $sel }}-{{ $cfg.name }}.privkey
    {{- end }}
    {{- if and $cfg.dkim $cfg.dkim.sign }}
    			Sign:
    {{- range $cfg.dkim.sign }}
    				- {{ . }}
    {{- end }}
    {{- else }}
    			Sign:
    {{- range $sel, $selCfg := $effectiveSelectors }}
    				- {{ $sel }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- if $cfg.dmarc }}
    		DMARC:
    			Localpart: {{ $cfg.dmarc.localpart }}
    			Account: {{ $cfg.dmarc.account }}
    			Mailbox: {{ $cfg.dmarc.mailbox }}
    {{- end }}
    {{- if $cfg.mtasts }}
    		MTASTS:
    			PolicyID: {{ printf "%s-%s-%s-%s" $cfg.name $cfg.mtasts.mode $cfg.mtasts.maxAge $.Values.hostname | sha256sum | trunc 8 }}
    			Mode: {{ $cfg.mtasts.mode }}
    			MaxAge: {{ $cfg.mtasts.maxAge }}
    			MX:
    				- {{ $.Values.hostname }}
    {{- end }}
    {{- if and $cfg.tlsrpt $cfg.tlsrpt.enabled }}
    		TLSRPT:
    			Localpart: {{ $cfg.tlsrpt.localpart }}
    			Account: {{ $cfg.tlsrpt.account }}
    			Mailbox: {{ $cfg.tlsrpt.mailbox }}
    {{- end }}
    {{- end }}
    {{- else }}
    	placeholder.invalid:
    		Description: Placeholder domain — configure real domains in values.yaml
    {{- end }}
    {{- if .Values.accounts }}
    Accounts:
    {{- range $acct, $acctCfg := .Values.accounts }}
    	{{ $acct }}:
    		Domain: {{ $acctCfg.domain }}
    {{- if $acctCfg.fullName }}
    		FullName: {{ $acctCfg.fullName }}
    {{- end }}
    		Destinations:
    {{- range $acctCfg.destinations }}
    {{- if .mailbox }}
    			{{ .address }}:
    				Mailbox: {{ .mailbox }}
    {{- else }}
    			{{ .address }}: nil
    {{- end }}
    {{- end }}
    {{- end }}
    {{- else }}
    Accounts:
    	postmaster:
    		Domain: {{ if .Values.domains }}{{ (first .Values.domains).name }}{{ else }}placeholder.invalid{{ end }}
    		Destinations:
    			postmaster@{{ if .Values.domains }}{{ (first .Values.domains).name }}{{ else }}placeholder.invalid{{ end }}:
    				Mailbox: Inbox
    {{- end }}
    {{- if .Values.selfDelivery.enabled }}
    Routes:
    {{- range $cfg := .Values.domains }}
    	-
    		ToDomain:
    			- {{ $cfg.name }}
    		Transport: selfdelivery
    {{- end }}
    {{- end }}
{{- if .Values.admin.passwordHash }}
  admin-password-hash: {{ .Values.admin.passwordHash | quote }}
{{- end }}
{{- range $cfg := .Values.domains }}
{{- if $cfg.dkim }}
{{- range $sel, $selCfg := $cfg.dkim.selectors }}
{{- if $selCfg.privateKey }}
  {{ $sel }}-{{ $cfg.name }}.privkey: |
    -----BEGIN PRIVATE KEY-----
    {{ $selCfg.privateKey }}
    -----END PRIVATE KEY-----
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
