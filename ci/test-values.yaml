hostname: mail.example.com
staticPublicIPs:
  ipv4: "203.0.113.5"
logLevel: info
admin:
  passwordHash: "$2b$10$examplehashhere"
domains:
  - name: example.com
    description: "Primary domain"
    dkim:
      selectors:
        sel1:
          algorithm: ed25519
          privateKey: "dGVzdC1wcml2YXRlLWtleQ=="
      sign:
        - sel1
    dmarc:
      localpart: dmarcreports
      account: postmaster
      mailbox: DMARC
    mtasts:
      mode: enforce
      maxAge: 24h
    tlsrpt:
      localpart: tlsreports
      account: postmaster
      mailbox: TLSRPT
accounts:
  postmaster:
    domain: example.com
    fullName: "Postmaster"
    destinations:
      - address: postmaster@example.com
        mailbox: Inbox
providers:
  certProvider:
    platform: certManager
    config:
      issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
tlsManagement:
  enabled: true
  provider: certProvider
