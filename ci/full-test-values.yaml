hostname: mail.example.com
staticPublicIPs:
  ipv4: "203.0.113.5"
  ipv6: "2001:db8::1"
logLevel: info
admin:
  passwordHash: "$2b$10$examplehashhere"
domains:
  - name: example.com
    description: "Primary domain"
    dkim:
      selectors:
        sel1:
          algorithm: ed25519
          privateKey: "dGVzdC1wcml2YXRlLWtleQ=="
      sign:
        - sel1
    dmarc:
      localpart: dmarcreports
      account: postmaster
      mailbox: DMARC
    mtasts:
      mode: enforce
      maxAge: 24h
    tlsrpt:
      localpart: tlsreports
      account: postmaster
      mailbox: TLSRPT
accounts:
  postmaster:
    domain: example.com
    fullName: "Postmaster"
    destinations:
      - address: postmaster@example.com
        mailbox: Inbox
providers:
  certProvider:
    platform: certManager
    config:
      issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
  ipProvider:
    platform: azureAso
    config:
      subscriptionId: "00000000-0000-0000-0000-000000000000"
      resourceGroup: my-rg
      location: eastus
      publicIp:
        name: mox-mail-ip
        domainNameLabel: mail
tlsManagement:
  enabled: true
  provider: certProvider
outboundPublicIpManagement:
  enabled: true
  provider: ipProvider
transport:
  enabled: true
  type: submissions
  host: smtp.sendgrid.net
  port: 465
  auth:
    username: apikey
    password: SG.test-key
    mechanisms:
      - PLAIN
dnssecResolverSidecar:
  enabled: true
selfDelivery:
  enabled: true
metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    labels:
      release: prometheus
networkPolicy:
  enabled: true
podDisruptionBudget:
  enabled: true
